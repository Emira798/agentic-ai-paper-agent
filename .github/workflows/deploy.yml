name: Deploy to Production

on:
  push:
    tags:
      - 'v*.*.*'  # 推送版本标签时触发部署

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # 获取所有标签

    - name: Get version
      id: get_version
      run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push production image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: |
          ghcr.io/${{ github.repository_owner,, }}/ai-paper-writer:${{ steps.get_version.outputs.VERSION }}
          ghcr.io/${{ github.repository_owner,, }}/ai-paper-writer:latest
        labels: |
          org.opencontainers.image.version=${{ steps.get_version.outputs.VERSION }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Deploy notification
      run: |
        echo "🚀 成功部署版本 ${{ steps.get_version.outputs.VERSION }} 到生产环境!"
        echo "📦 镜像地址: ghcr.io/${{ github.repository_owner }}/ai-paper-writer:${{ steps.get_version.outputs.VERSION }}"